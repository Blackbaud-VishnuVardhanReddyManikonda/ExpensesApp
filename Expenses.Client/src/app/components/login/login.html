<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card mt-5">
        <!-- Card Header -->
        <div class="card-header bg-primary bg-opacity-75">
          <h3 class="card-title mb-0 text-white">Login</h3>
        </div>

        <!-- Card Body -->
        <div class="card-body">
          <!-- ✅ Error Alert with Icon and Close Button -->
          <div class="alert alert-danger alert-dismissible fade show" 
               *ngIf="errorMessage" 
               role="alert">
            <strong>
              <i class="bi bi-exclamation-circle"></i>
              Error:
            </strong>
            {{ errorMessage }}
            <button type="button" class="btn-close" (click)="errorMessage = null"></button>
          </div>

          <!-- Success Message (Optional) -->
          <div class="alert alert-success alert-dismissible fade show" 
               *ngIf="successMessage" 
               role="alert">
            <strong>
              <i class="bi bi-check-circle"></i>
              Success:
            </strong>
            {{ successMessage }}
            <button type="button" class="btn-close" (click)="successMessage = null"></button>
          </div>

          <!-- Form -->
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <!-- Email Field -->
            <div class="mb-3">
              <label for="email" class="form-label">
                <i class="bi bi-envelope"></i> Email
              </label>
              <input
                type="email"
                class="form-control"
                [ngClass]="{'is-invalid': hasError('email', 'required') || hasError('email', 'email')}"
                id="email"
                formControlName="email"
                placeholder="Enter your email"
              />
              <!-- Email Required Error -->
              <div class="invalid-feedback d-block" *ngIf="hasError('email', 'required')">
                <i class="bi bi-exclamation-triangle"></i>
                Email is required
              </div>
              <!-- Email Format Error -->
              <div class="invalid-feedback d-block" *ngIf="hasError('email', 'email')">
                <i class="bi bi-exclamation-triangle"></i>
                Please enter a valid email address
              </div>
            </div>

            <!-- Password Field -->
            <div class="mb-3">
              <label for="password" class="form-label">
                <i class="bi bi-lock"></i> Password
              </label>
              <input
                type="password"
                class="form-control"
                [ngClass]="{'is-invalid': hasError('password', 'required') || hasError('password', 'minlength')}"
                id="password"
                formControlName="password"
                placeholder="Enter your password"
              />
              <!-- Password Required Error -->
              <div class="invalid-feedback d-block" *ngIf="hasError('password', 'required')">
                <i class="bi bi-exclamation-triangle"></i>
                Password is required
              </div>
              <!-- Password Length Error -->
              <div class="invalid-feedback d-block" *ngIf="hasError('password', 'minlength')">
                <i class="bi bi-exclamation-triangle"></i>
                Password must be at least 6 characters long
              </div>
            </div>

            <!-- Login Button with Loading State -->
            <div class="d-grid">
              <button 
                type="submit" 
                class="btn btn-primary" 
                [disabled]="!loginForm.valid || isLoading"
              >
                <span *ngIf="!isLoading">
                  <i class="bi bi-box-arrow-in-right"></i> Login
                </span>
                <span *ngIf="isLoading">
                  <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  Logging in...
                </span>
              </button>
            </div>

            <!-- Forgot Password Link (Optional) -->
            <div class="text-center mt-2">
              <a href="#" class="text-muted small">Forgot password?</a>
            </div>

            <!-- Link to Sign Up -->
            <div class="text-center mt-3">
              Don't have an account? 
              <a [routerLink]="'/signup'" class="text-primary fw-bold">Sign up</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add some custom CSS for better error display -->
<style>
  .invalid-feedback {
    display: none;
    width: 100%;
    margin-top: 0.25rem;
    font-size: 0.875em;
    color: #dc3545;
  }

  .invalid-feedback.d-block {
    display: block;
  }

  .alert {
    margin-bottom: 1.5rem;
    border-radius: 0.5rem;
  }

  .alert i {
    margin-right: 0.5rem;
  }

  .form-label i {
    margin-right: 0.5rem;
  }

  .btn i {
    margin-right: 0.5rem;
  }
</style>
